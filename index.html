<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLB Pdf Tools - 极简工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/docx@8.2.2/build/index.umd.js"></script>
    <style>
        :root { --bg-cream: #f9f5f0; --card-cream: #ffffff; --accent-brown: #d4a373; --light-brown: #f1ece4; --text-main: #5d574f; }
        body { background-color: var(--bg-cream); color: var(--text-main); font-family: 'PingFang SC', sans-serif; -webkit-font-smoothing: antialiased; }
        .soft-card { background: var(--card-cream); border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.02); border: 1px solid rgba(255,255,255,0.6); padding: 2rem; margin-bottom: 2rem; }
        .upload-block { background-color: var(--light-brown); border-radius: 24px; transition: all 0.4s ease; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 140px; width: 100%; }
        .btn-main { background-color: var(--accent-brown); color: white; border-radius: 50px; transition: all 0.3s ease; font-weight: bold; }
        .img-item { border-radius: 16px; overflow: hidden; border: 2px solid transparent; background: #fff; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(249, 245, 240, 0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-20">
    <div id="loader">
        <div class="w-8 h-8 border-2 border-[#d4a373] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="loader-text" class="text-sm opacity-60">正在处理...</p>
    </div>

    <div class="max-w-2xl mx-auto px-6 pt-12">
        <header class="text-center mb-16">
            <h1 class="text-2xl font-light tracking-[0.4em] uppercase text-[#8b8175]">WLB Pdf Tools</h1>
            <p class="text-[10px] tracking-[0.2em] opacity-40 mt-2">平衡工作与生活 · 高效办公</p>
        </header>

        <section class="soft-card">
            <h2 class="text-sm font-bold tracking-widest mb-6">01 / 图片转 PDF</h2>
            <div onclick="document.getElementById('img-input').click()" class="upload-block mb-6">
                <input type="file" id="img-input" multiple accept="image/*" class="hidden">
                <span class="text-[11px] opacity-50">点击上传图片</span>
            </div>
            <div id="image-preview" class="grid grid-cols-4 gap-3 mb-8"></div>
            <input type="text" id="pdf-name" value="我的文档" class="w-full bg-transparent border-b border-[#eeeae4] pb-2 mb-4 outline-none text-sm">
            <button onclick="generatePDF()" class="btn-main w-full py-4 text-sm">生成 PDF 文件</button>
        </section>

        <section class="soft-card p-6 text-center">
            <textarea id="msg-input" rows="1" class="w-full bg-transparent text-sm outline-none text-center" placeholder="在此留下您的反馈..."></textarea>
            <button onclick="submitMessage()" class="text-[11px] tracking-widest mt-4 opacity-40 hover:opacity-100 transition font-bold text-[#d4a373]">提交留言</button>
        </section>

        <div class="space-y-6 mt-12">
            <div class="soft-card p-3 shadow-sm"><a id="ad-link-1" href="#"><img id="ad-img-1" src="" class="w-full rounded-[24px]"></a></div>
            <div class="soft-card p-3 shadow-sm"><a id="ad-link-2" href="#"><img id="ad-img-2" src="" class="w-full rounded-[24px]"></a></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const SUPABASE_URL = 'https://hgijeymlmywiaxgaitml.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnaWpleW1sbXl3aWF4Z2FpdG1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzE0MDQsImV4cCI6MjA5MDc0NzQwNH0.6NaI6LO9BafmLanlAH_ZSouNoQZ11yr3NwROLMCdRIM'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        const previewArea = document.getElementById('image-preview');
        const loader = document.getElementById('loader');
        
        // 留言功能修复
        window.submitMessage = async () => {
            const content = document.getElementById('msg-input').value;
            if (!content) return alert('请先输入留言内容');
            
            try {
                const { error } = await supabase
                    .from('user_messages')
                    .insert([{ content: content }]);
                
                if (error) throw error;
                
                alert('感谢反馈，留言成功！');
                document.getElementById('msg-input').value = '';
            } catch (err) {
                console.error('留言详细错误信息:', err);
                alert('发送失败：' + (err.message || '请检查网络或数据库权限'));
            }
        };

        // 图片预览逻辑
        document.getElementById('img-input').addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const div = document.createElement('div');
                    div.className = 'img-item relative aspect-square shadow-sm';
                    div.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">`;
                    previewArea.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        // 加载广告
        (async () => {
            const { data } = await supabase.from('ads_config').select('*').order('id', { ascending: true });
            if (data && data.length >= 2) {
                document.getElementById('ad-img-1').src = data[0].img_url;
                document.getElementById('ad-link-1').href = data[0].link_url;
                document.getElementById('ad-img-2').src = data[1].img_url;
                document.getElementById('ad-link-2').href = data[1].link_url;
            }
        })();

        // PDF生成省略部分逻辑(保持原有逻辑)...
    </script>
</body>
</html>
